suite: SecretProviderClass Vault hub/spoke parity
templates:
  - templates/secretproviderclass-vault.yaml
release:
  name: release-test
tests:
  - it: renders nothing when SecretProviderClass is disabled
    set:
      ocpSecretsStoreCsiVault:
        secretProviderClass:
          enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: sets vaultAddress to hub Vault route pattern
    set:
      global:
        hubClusterDomain: apps.hub.example.org
    asserts:
      - equal:
          path: spec.parameters.vaultAddress
          value: "https://vault-vault.apps.hub.example.org"

  - it: uses hub mount and hub role on hub cluster
    set:
      clusterGroup:
        isHubCluster: true
      ocpSecretsStoreCsiVault:
        vault:
          hubMountPath: hub
        rbac:
          rolename: hub-role
    asserts:
      - equal:
          path: spec.parameters.vaultKubernetesMountPath
          value: hub
      - equal:
          path: spec.parameters.roleName
          value: hub-role

  - it: uses spoke mount and spoke role on spoke cluster
    set:
      clusterGroup:
        isHubCluster: false
      global:
        clusterDomain: spoke.example.com
    asserts:
      - equal:
          path: spec.parameters.vaultKubernetesMountPath
          value: spoke.example.com
      - equal:
          path: spec.parameters.roleName
          value: spoke.example.com-role

  - it: uses hub auth when hashicorp-vault application is present on spoke
    set:
      clusterGroup:
        isHubCluster: false
        applications:
          vault:
            chart: hashicorp-vault
    asserts:
      - equal:
          path: spec.parameters.vaultKubernetesMountPath
          value: hub
      - equal:
          path: spec.parameters.roleName
          value: hub-role

  - it: passes vaultCACertPath when set
    set:
      ocpSecretsStoreCsiVault:
        tls:
          vaultCACertPath: /etc/vault-ca/ca.crt
    asserts:
      - equal:
          path: spec.parameters.vaultCACertPath
          value: /etc/vault-ca/ca.crt

  - it: omits vaultCACertPath when empty
    set:
      ocpSecretsStoreCsiVault:
        tls:
          vaultCACertPath: ""
    asserts:
      - notExists:
          path: spec.parameters.vaultCACertPath

  - it: renders secretObjects when provided
    set:
      ocpSecretsStoreCsiVault:
        secretObjects:
          - secretName: synced
            type: Opaque
            data:
              - objectName: example-password
                key: password
    asserts:
      - equal:
          path: spec.secretObjects[0].secretName
          value: synced
