suite: SecretProviderClass Vault hub/spoke parity
templates:
  - templates/csi-library.tpl
  - templates/install-default-manifests.yaml
release:
  name: release-test
tests:
  - it: renders nothing when SecretProviderClass is disabled
    template: templates/install-default-manifests.yaml
    set:
      ocpSecretsStoreCsiVault:
        secretProviderClass:
          installDefaultManifests: true
          enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: sets vaultAddress to hub Vault route pattern
    template: templates/install-default-manifests.yaml
    set:
      ocpSecretsStoreCsiVault:
        secretProviderClass:
          installDefaultManifests: true
      global:
        hubClusterDomain: apps.hub.example.org
    documentSelector:
      path: kind
      value: SecretProviderClass
    asserts:
      - equal:
          path: spec.parameters.vaultAddress
          value: "https://vault-vault.apps.hub.example.org"

  - it: uses external vault address when externalAddress is set
    template: templates/install-default-manifests.yaml
    set:
      ocpSecretsStoreCsiVault:
        secretProviderClass:
          installDefaultManifests: true
        vault:
          externalAddress: "https://vault.external.example:8200"
      global:
        hubClusterDomain: apps.hub.example.org
    documentSelector:
      path: kind
      value: SecretProviderClass
    asserts:
      - equal:
          path: spec.parameters.vaultAddress
          value: "https://vault.external.example:8200"

  - it: uses hub mount and hub role on hub cluster
    template: templates/install-default-manifests.yaml
    set:
      clusterGroup:
        isHubCluster: true
      ocpSecretsStoreCsiVault:
        secretProviderClass:
          installDefaultManifests: true
        vault:
          hubMountPath: hub
        rbac:
          rolename: hub-role
    documentSelector:
      path: kind
      value: SecretProviderClass
    asserts:
      - equal:
          path: spec.parameters.vaultKubernetesMountPath
          value: hub
      - equal:
          path: spec.parameters.roleName
          value: hub-role

  - it: uses spoke mount and spoke role on spoke cluster
    template: templates/install-default-manifests.yaml
    set:
      ocpSecretsStoreCsiVault:
        secretProviderClass:
          installDefaultManifests: true
      clusterGroup:
        isHubCluster: false
      global:
        clusterDomain: spoke.example.com
    documentSelector:
      path: kind
      value: SecretProviderClass
    asserts:
      - equal:
          path: spec.parameters.vaultKubernetesMountPath
          value: spoke.example.com
      - equal:
          path: spec.parameters.roleName
          value: spoke.example.com-role

  - it: uses hub auth when hashicorp-vault application is present on spoke
    template: templates/install-default-manifests.yaml
    set:
      ocpSecretsStoreCsiVault:
        secretProviderClass:
          installDefaultManifests: true
      clusterGroup:
        isHubCluster: false
        applications:
          vault:
            chart: hashicorp-vault
    documentSelector:
      path: kind
      value: SecretProviderClass
    asserts:
      - equal:
          path: spec.parameters.vaultKubernetesMountPath
          value: hub
      - equal:
          path: spec.parameters.roleName
          value: hub-role

  - it: passes vaultCACertPath when set
    template: templates/install-default-manifests.yaml
    set:
      ocpSecretsStoreCsiVault:
        secretProviderClass:
          installDefaultManifests: true
        tls:
          vaultCACertPath: /etc/vault-ca/ca.crt
    documentSelector:
      path: kind
      value: SecretProviderClass
    asserts:
      - equal:
          path: spec.parameters.vaultCACertPath
          value: /etc/vault-ca/ca.crt

  - it: omits vaultCACertPath when empty and caProvider is disabled
    template: templates/install-default-manifests.yaml
    set:
      ocpSecretsStoreCsiVault:
        secretProviderClass:
          installDefaultManifests: true
        caProvider:
          enabled: false
        tls:
          vaultCACertPath: ""
    documentSelector:
      path: kind
      value: SecretProviderClass
    asserts:
      - notExists:
          path: spec.parameters.vaultCACertPath

  - it: defaults vaultCACertPath on hub when tls path empty and caProvider enabled
    template: templates/install-default-manifests.yaml
    set:
      clusterGroup:
        isHubCluster: true
      ocpSecretsStoreCsiVault:
        secretProviderClass:
          installDefaultManifests: true
        tls:
          vaultCACertPath: ""
    documentSelector:
      path: kind
      value: SecretProviderClass
    asserts:
      - equal:
          path: spec.parameters.vaultCACertPath
          value: /etc/pki/vault-ca/kube-root-ca.crt

  - it: defaults vaultCACertPath on spoke when tls path empty and caProvider enabled
    template: templates/install-default-manifests.yaml
    set:
      clusterGroup:
        isHubCluster: false
      ocpSecretsStoreCsiVault:
        secretProviderClass:
          installDefaultManifests: true
        tls:
          vaultCACertPath: ""
    documentSelector:
      path: kind
      value: SecretProviderClass
    asserts:
      - equal:
          path: spec.parameters.vaultCACertPath
          value: /etc/pki/vault-ca/hub-kube-root-ca.crt

  - it: uses hub CA default path on spoke when hashicorp-vault app is present
    template: templates/install-default-manifests.yaml
    set:
      clusterGroup:
        isHubCluster: false
        applications:
          vault:
            chart: hashicorp-vault
      ocpSecretsStoreCsiVault:
        secretProviderClass:
          installDefaultManifests: true
        tls:
          vaultCACertPath: ""
    documentSelector:
      path: kind
      value: SecretProviderClass
    asserts:
      - equal:
          path: spec.parameters.vaultCACertPath
          value: /etc/pki/vault-ca/kube-root-ca.crt

  - it: explicit vaultCACertPath overrides caProvider defaults
    template: templates/install-default-manifests.yaml
    set:
      clusterGroup:
        isHubCluster: true
      ocpSecretsStoreCsiVault:
        secretProviderClass:
          installDefaultManifests: true
        tls:
          vaultCACertPath: /etc/vault-ca/explicit.crt
    documentSelector:
      path: kind
      value: SecretProviderClass
    asserts:
      - equal:
          path: spec.parameters.vaultCACertPath
          value: /etc/vault-ca/explicit.crt

  - it: renders secretObjects when provided
    template: templates/install-default-manifests.yaml
    set:
      ocpSecretsStoreCsiVault:
        secretProviderClass:
          installDefaultManifests: true
        secretObjects:
          - secretName: synced
            type: Opaque
            data:
              - objectName: example-password
                key: password
    documentSelector:
      path: kind
      value: SecretProviderClass
    asserts:
      - equal:
          path: spec.secretObjects[0].secretName
          value: synced
