suite: RBAC and ServiceAccount for Vault CSI workloads
templates:
  - templates/csi-library.tpl
  - templates/install-default-manifests.yaml
release:
  name: release-test
tests:
  - it: renders nothing when SecretProviderClass is disabled
    template: templates/install-default-manifests.yaml
    set:
      ocpSecretsStoreCsiVault:
        secretProviderClass:
          installDefaultManifests: true
          enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: creates SA token Secret and ClusterRoleBinding when enabled
    template: templates/install-default-manifests.yaml
    set:
      ocpSecretsStoreCsiVault:
        secretProviderClass:
          installDefaultManifests: true
    asserts:
      - hasDocuments:
          count: 4
      - containsDocument:
          kind: ServiceAccount
          apiVersion: v1
          any: true
      - containsDocument:
          kind: Secret
          apiVersion: v1
          any: true
      - containsDocument:
          kind: ClusterRoleBinding
          apiVersion: rbac.authorization.k8s.io/v1
          any: true
      - containsDocument:
          kind: SecretProviderClass
          apiVersion: secrets-store.csi.x-k8s.io/v1
          any: true

  - it: uses unique ClusterRoleBinding name derived from release
    template: templates/install-default-manifests.yaml
    set:
      ocpSecretsStoreCsiVault:
        secretProviderClass:
          installDefaultManifests: true
    documentSelector:
      path: kind
      value: ClusterRoleBinding
    asserts:
      - equal:
          path: metadata.name
          value: release-test-openshift-sscsi-vault-tokenreview

  - it: omits ServiceAccount and token Secret when serviceAccount.create is false
    template: templates/install-default-manifests.yaml
    set:
      ocpSecretsStoreCsiVault:
        secretProviderClass:
          installDefaultManifests: true
        rbac:
          serviceAccount:
            create: false
            name: existing-sa
            namespace: my-ns
    asserts:
      - hasDocuments:
          count: 2
      - containsDocument:
          kind: ClusterRoleBinding
          apiVersion: rbac.authorization.k8s.io/v1
          any: true
      - containsDocument:
          kind: SecretProviderClass
          apiVersion: secrets-store.csi.x-k8s.io/v1
          any: true
